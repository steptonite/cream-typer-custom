name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a newer commit lands in the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e '.[macos,dev]'
      - name: Smoke import (no CGEventTap)
        run: |
          python -c "from pysar import config, recorder, transcriber; print('imports OK')"
          python -c "from pysar.backend import HotkeyListener, Paster, Tray; print('backend OK')"
      - name: Pytest
        run: pytest -q
